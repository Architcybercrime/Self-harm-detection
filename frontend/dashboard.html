<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SafeSignal — Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root {
      --ss-red: #C2002F;
      --ss-dark: #0D0D0D;
      --ss-panel: #161616;
      --ss-border: rgba(255,255,255,0.07);
      --ss-muted: rgba(255,255,255,0.35);
    }
    * { box-sizing: border-box; }
    body {
      background: var(--ss-dark);
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
    }

    /* SIDEBAR */
    .sidebar {
      width: 220px;
      min-height: 100vh;
      background: var(--ss-panel);
      border-right: 1px solid var(--ss-border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0;
      z-index: 100;
    }
    .sidebar-logo {
      padding: 24px 20px;
      border-bottom: 1px solid var(--ss-border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-box {
      width: 40px; height: 40px;
      border: 1px solid rgba(255,255,255,0.15);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      line-height: 1; flex-shrink: 0;
    }
    .logo-box .t { font-size: 11px; font-weight: 700; color: #fff; }
    .logo-box .b { font-size: 11px; font-weight: 700; color: #fff; }
    .logo-box .b span { color: var(--ss-red); }
    .logo-name { font-size: 11px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ss-muted); }
    .sidebar-user {
      padding: 16px 20px;
      border-bottom: 1px solid var(--ss-border);
      font-size: 12px;
      color: var(--ss-muted);
    }
    .sidebar-user strong { display: block; color: #fff; font-size: 13px; margin-bottom: 2px; }
    .sidebar-nav { flex: 1; padding: 16px 0; }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 20px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ss-muted);
      text-decoration: none;
      transition: color 0.2s, background 0.2s;
      cursor: pointer;
    }
    .nav-item:hover { color: #fff; background: rgba(255,255,255,0.04); }
    .nav-item.active { color: #fff; border-left: 2px solid var(--ss-red); background: rgba(194,0,47,0.08); }
    .nav-item i { font-size: 15px; }
    .sidebar-bottom { padding: 16px 20px; border-top: 1px solid var(--ss-border); }
    .btn-logout {
      width: 100%;
      background: none;
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--ss-muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 10px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-logout:hover { border-color: var(--ss-red); color: var(--ss-red); }

    /* MAIN */
    .main { margin-left: 220px; flex: 1; padding: 40px; min-height: 100vh; }
    .page-header { margin-bottom: 36px; padding-bottom: 24px; border-bottom: 1px solid var(--ss-border); }
    .page-label { font-size: 10px; font-weight: 700; letter-spacing: 0.25em; text-transform: uppercase; color: var(--ss-red); margin-bottom: 6px; }
    .page-title { font-size: 36px; font-weight: 900; text-transform: uppercase; letter-spacing: -0.01em; line-height: 1; color: #fff; }

    /* CARD */
    .ss-card { background: var(--ss-panel); border: 1px solid var(--ss-border); padding: 28px; margin-bottom: 24px; }
    .card-label { font-size: 10px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ss-muted); margin-bottom: 16px; }

    /* TEXT INPUT */
    textarea.ss-input {
      width: 100%;
      background: #0D0D0D;
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      font-size: 14px;
      line-height: 1.6;
      padding: 16px;
      resize: vertical;
      min-height: 140px;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea.ss-input:focus { border-color: rgba(255,255,255,0.3); }
    textarea.ss-input::placeholder { color: rgba(255,255,255,0.2); }

    .btn-ss {
      background: var(--ss-red);
      color: #fff;
      border: none;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 12px 28px;
      cursor: pointer;
      transition: background 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-ss:hover { background: #a00026; }
    .btn-ss:disabled { opacity: 0.5; cursor: not-allowed; }

    /* RESULT */
    #resultPanel { display: none; }
    #resultPanel.show { display: block; animation: fadeUp 0.4s ease both; }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .result-level-text { font-size: 52px; font-weight: 900; text-transform: uppercase; line-height: 1; margin-bottom: 12px; }
    .result-bar-wrap { height: 3px; background: rgba(255,255,255,0.08); margin-bottom: 16px; }
    .result-bar { height: 100%; width: 0%; transition: width 1s cubic-bezier(0.16,1,0.3,1); }
    .result-meta { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 20px; }
    .meta-item { font-size: 12px; color: var(--ss-muted); }
    .meta-item strong { color: #fff; display: block; font-size: 15px; }
    .indicators { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
    .indicator-tag { font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; padding: 4px 12px; border: 1px solid rgba(255,255,255,0.15); color: var(--ss-muted); }

    /* HELPLINES */
    .helplines { display: none; background: rgba(194,0,47,0.1); border: 1px solid rgba(194,0,47,0.3); padding: 20px; margin-top: 16px; }
    .helplines.show { display: block; }
    .helplines-title { font-size: 11px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ss-red); margin-bottom: 12px; }
    .helpline-item { font-size: 13px; color: rgba(255,255,255,0.7); padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .helpline-item:last-child { border: none; }
    .helpline-item strong { color: #fff; }
  </style>
</head>
<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-box">
        <div class="t">SS</div>
        <div class="b">A<span>I</span></div>
      </div>
      <div class="logo-name">SafeSignal</div>
    </div>
    <div class="sidebar-user">
      <strong id="sidebarUsername">—</strong>
      Logged in
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item active" href="dashboard.html">
        <i class="bi bi-cpu"></i> Analysis
      </a>
      <a class="nav-item" href="history.html">
        <i class="bi bi-clock-history"></i> History
      </a>
      <a class="nav-item" href="stats.html">
        <i class="bi bi-bar-chart-line"></i> Statistics
      </a>
    </nav>
    <div class="sidebar-bottom">
      <button class="btn-logout" onclick="logout()">
        <i class="bi bi-box-arrow-left me-2"></i> Sign Out
      </button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="page-header">
      <div class="page-label">// DASHBOARD</div>
      <div class="page-title">ANALYSE<br>SIGNALS</div>
    </div>

    <div class="row g-4">

      <!-- Input -->
      <div class="col-lg-6">
        <div class="ss-card">
          <div class="card-label">// Input Text</div>
          <textarea class="ss-input" id="textInput"
            placeholder="Type or paste text here to analyse for risk signals..."></textarea>
          <div class="mt-3">
            <button class="btn-ss" id="predictBtn" onclick="runPrediction()">
              <i class="bi bi-cpu"></i>
              <span id="predictBtnText">RUN ANALYSIS</span>
              <span id="predictSpinner" style="display:none">
                <span class="spinner-border spinner-border-sm"></span>
              </span>
            </button>
          </div>
          <div id="textError" style="display:none; color:#ff6b8a; font-size:12px; margin-top:10px;"></div>
        </div>
      </div>

      <!-- Result -->
      <div class="col-lg-6">
        <div class="ss-card" style="min-height:200px;">
          <div class="card-label">// Result</div>

          <div id="resultPlaceholder" style="color:var(--ss-muted); font-size:13px;">
            Results will appear here after analysis.
          </div>

          <div id="resultPanel">
            <div class="result-level-text" id="resultLevel">—</div>
            <div class="result-bar-wrap">
              <div class="result-bar" id="resultBar"></div>
            </div>
            <div class="result-meta">
              <div class="meta-item">
                <strong id="metaConfidence">—</strong>Confidence
              </div>
              <div class="meta-item">
                <strong id="metaSentiment">—</strong>Sentiment
              </div>
              <div class="meta-item">
                <strong id="metaSeverity">—</strong>Severity
              </div>
            </div>
            <div class="indicators" id="indicators"></div>
            <div class="helplines" id="helplines">
              <div class="helplines-title">
                <i class="bi bi-telephone-fill me-2"></i>
                IMMEDIATE SUPPORT AVAILABLE
              </div>
              <div class="helpline-item"><strong>iCall</strong> 9152987821</div>
              <div class="helpline-item"><strong>Vandrevala Foundation</strong> 1860-2662-345</div>
              <div class="helpline-item"><strong>AASRA</strong> 9820466627</div>
            </div>
          </div>

        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const API   = 'http://127.0.0.1:5000/api';
    const token = localStorage.getItem('token');
  //  if (!token) window.location.href = 'login.html';

    document.getElementById('sidebarUsername').textContent =
      localStorage.getItem('username') || 'User';

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('username');
      window.location.href = 'login.html';
    }

    async function runPrediction() {
      const text  = document.getElementById('textInput').value.trim();
      const errEl = document.getElementById('textError');
      errEl.style.display = 'none';

      if (!text) {
        errEl.textContent = 'Please enter some text to analyse.';
        errEl.style.display = 'block';
        return;
      }

      document.getElementById('predictBtn').disabled = true;
      document.getElementById('predictBtnText').style.display = 'none';
      document.getElementById('predictSpinner').style.display = 'inline';

      try {
        const res  = await fetch(`${API}/predict`, {
          method:  'POST',
          headers: {
            'Content-Type':  'application/json',
            'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify({ text })
        });

        if (res.status === 401) { logout(); return; }
        const data = await res.json();

        const colours = { 'HIGH': '#E4032E', 'LOW': '#2A8A4A', 'MEDIUM': '#D4A017' };
        const colour  = colours[data.risk_level] || '#fff';

        document.getElementById('resultPlaceholder').style.display = 'none';
        document.getElementById('resultPanel').classList.add('show');

        document.getElementById('resultLevel').textContent = data.risk_level || '—';
        document.getElementById('resultLevel').style.color = colour;

        const score = Math.round((data.confidence || 0) * 100);
        const bar   = document.getElementById('resultBar');
        bar.style.background = colour;
        bar.style.width = '0%';
        requestAnimationFrame(() => requestAnimationFrame(() => {
          bar.style.width = score + '%';
        }));

        document.getElementById('metaConfidence').textContent = score + '%';
        document.getElementById('metaSentiment').textContent  =
          data.sentiment_score !== undefined ? data.sentiment_score.toFixed(2) : '—';
        document.getElementById('metaSeverity').textContent   =
          data.risk_indicators?.severity || '—';

        const inds = data.risk_indicators || {};
        document.getElementById('indicators').innerHTML =
          Object.entries(inds)
            .map(([k,v]) => `<span class="indicator-tag">${k}: ${v}</span>`)
            .join('');

        const helplines = document.getElementById('helplines');
        data.risk_level === 'HIGH'
          ? helplines.classList.add('show')
          : helplines.classList.remove('show');

      } catch(err) {
        errEl.textContent = 'Cannot connect to server. Make sure backend is running.';
        errEl.style.display = 'block';
      } finally {
        document.getElementById('predictBtn').disabled = false;
        document.getElementById('predictBtnText').style.display = 'inline';
        document.getElementById('predictSpinner').style.display = 'none';
      }
    }

    document.getElementById('textInput').addEventListener('keydown', e => {
      if (e.key === 'Enter' && e.ctrlKey) runPrediction();
    });
  </script>
</body>
</html>
