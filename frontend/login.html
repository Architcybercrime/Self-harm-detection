<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SafeSignal — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root {
      --ss-red: #C2002F;
      --ss-dark: #0D0D0D;
    }
    body {
      background: var(--ss-dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: 'Segoe UI', sans-serif;
    }
    .ss-topbar {
      padding: 20px 40px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .ss-logo-box {
      width: 48px; height: 48px;
      border: 1px solid rgba(255,255,255,0.15);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      line-height: 1;
    }
    .ss-logo-box .top { font-size: 13px; font-weight: 700; color: #fff; letter-spacing: 0.05em; }
    .ss-logo-box .bot { font-size: 13px; font-weight: 700; color: #fff; }
    .ss-logo-box .bot span { color: var(--ss-red); }
    .ss-brand { color: rgba(255,255,255,0.4); font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; margin-left: 4px; }
    .auth-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .auth-card {
      background: #161616;
      border: 1px solid rgba(255,255,255,0.08);
      width: 100%;
      max-width: 420px;
      padding: 48px 40px;
    }
    .auth-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--ss-red);
      margin-bottom: 8px;
    }
    .auth-title {
      font-size: 32px;
      font-weight: 900;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: -0.01em;
      margin-bottom: 36px;
      line-height: 1;
    }
    .form-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 6px;
    }
    .form-control {
      background: #0D0D0D !important;
      border: 1px solid rgba(255,255,255,0.1) !important;
      color: #fff !important;
      border-radius: 0 !important;
      padding: 12px 14px;
      font-size: 14px;
      transition: border-color 0.2s;
    }
    .form-control:focus {
      border-color: rgba(255,255,255,0.35) !important;
      box-shadow: none !important;
    }
    .form-control::placeholder { color: rgba(255,255,255,0.2) !important; }
    .input-group-text {
      background: #0D0D0D !important;
      border: 1px solid rgba(255,255,255,0.1) !important;
      border-left: none !important;
      color: rgba(255,255,255,0.3) !important;
      border-radius: 0 !important;
      cursor: pointer;
      transition: color 0.2s;
    }
    .input-group-text:hover { color: rgba(255,255,255,0.7) !important; }
    .btn-ss {
      background: var(--ss-red);
      color: #fff;
      border: none;
      border-radius: 0;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 14px;
      width: 100%;
      transition: background 0.2s;
    }
    .btn-ss:hover { background: #a00026; color: #fff; }
    .auth-footer {
      text-align: center;
      margin-top: 28px;
      font-size: 13px;
      color: rgba(255,255,255,0.3);
    }
    .auth-footer a {
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }
    .auth-footer a:hover { color: var(--ss-red); }
    .auth-divider { border-color: rgba(255,255,255,0.07); margin: 28px 0; }

    @media (max-width: 576px) {
  .ss-topbar { padding: 14px 20px; }
  .auth-card { padding: 32px 24px; }
  .auth-title { font-size: 26px; }
} 
  </style>
</head>
<body>

  <div class="ss-topbar">
    <div class="ss-logo-box">
      <div class="top">SS</div>
      <div class="bot">A<span>I</span></div>
    </div>
    <span class="ss-brand">SafeSignal</span>
  </div>

  <div class="auth-wrap">
    <div class="auth-card">

      <div class="auth-label">// SECURE ACCESS</div>
      <div class="auth-title">SIGN IN</div>

      <!-- Alert box: hidden by default, shown on error or success -->
      <div id="alertBox" style="display:none; border-radius:0; font-size:13px; padding:12px 16px; margin-bottom:20px; border-left:3px solid; "></div>

      <form id="loginForm" novalidate>
        <div class="mb-4">
          <label class="form-label" for="username">Username</label>
          <input type="text" class="form-control" id="username"
                 placeholder="Enter your username" autocomplete="username"/>
        </div>
        <div class="mb-4">
          <label class="form-label" for="password">Password</label>
          <div class="input-group">
            <input type="password" class="form-control" id="password"
                   placeholder="Enter your password" autocomplete="current-password"/>
            <span class="input-group-text" onclick="togglePassword('password', this)">
              <i class="bi bi-eye"></i>
            </span>
          </div>
        </div>
        <button type="submit" class="btn-ss mt-2" id="loginBtn">
          <span id="btnText">+ SIGN IN</span>
          <span id="btnSpinner" style="display:none">
            <span class="spinner-border spinner-border-sm" role="status"></span> SIGNING IN...
          </span>
        </button>
      </form>

      <hr class="auth-divider">

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Create one</a>
      </div>
      <div class="auth-footer mt-2">
        <a href="index.html">← Back to SafeSignal</a>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="config.js"></script>
  <script>
    const API = API_BASE; /* API_BASE from config.js already includes /api */

    /* ─────────────────────────────────────────────
       STEP 2: If user is already logged in
       (token exists in localStorage from a previous
       login), skip this page and go straight to
       the dashboard — no need to log in again.
    ───────────────────────────────────────────── */
    if (localStorage.getItem('token')) {
      window.location.href = 'dashboard.html';
    }

    /* ─────────────────────────────────────────────
       STEP 3: Toggle password show/hide
       When eye icon is clicked, switches the input
       type between "password" and "text"
    ───────────────────────────────────────────── */
    function togglePassword(fieldId, iconWrap) {
      const field = document.getElementById(fieldId);
      const icon  = iconWrap.querySelector('i');
      if (field.type === 'password') {
        field.type = 'text';
        icon.className = 'bi bi-eye-slash';
      } else {
        field.type = 'password';
        icon.className = 'bi bi-eye';
      }
    }

    /* ─────────────────────────────────────────────
       STEP 4: Show alert message
       type = 'error' → red, type = 'success' → green
    ───────────────────────────────────────────── */
    /* Pre-warm backend silently */
    fetch(API + '/health', { method: 'GET' }).catch(() => {});

    function showAlert(msg, type = 'error') {
      const box = document.getElementById('alertBox');
      box.textContent = msg;
      box.style.display = 'block';
      if (type === 'error') {
        box.style.background = 'rgba(194,0,47,0.15)';
        box.style.color      = '#ff6b8a';
        box.style.borderColor = '#C2002F';
      } else if (type === 'success') {
        box.style.background = 'rgba(42,138,74,0.15)';
        box.style.color      = '#6fcf97';
        box.style.borderColor = '#2A8A4A';
      } else { /* info / warning */
        box.style.background = 'rgba(212,160,23,0.15)';
        box.style.color      = '#f0c040';
        box.style.borderColor = '#D4A017';
      }
    }

    /* ─────────────────────────────────────────────
       STEP 5: Show/hide spinner on button
       While waiting for API response, button shows
       a spinner so user knows something is happening
    ───────────────────────────────────────────── */
    function setLoading(on) {
      document.getElementById('loginBtn').disabled   = on;
      document.getElementById('btnText').style.display    = on ? 'none'  : 'inline';
      document.getElementById('btnSpinner').style.display = on ? 'inline': 'none';
    }

    /* ─────────────────────────────────────────────
       STEP 6: The actual login — runs when form submitted
       
       What happens:
       1. Read username + password from inputs
       2. Validate they are not empty
       3. Send POST request to /api/login with JSON body
       4. If backend returns a token → save it to
          localStorage so every future page can use it
       5. Save username too (for display on dashboard)
       6. Redirect to dashboard.html
       7. If backend returns error → show red message
       8. If backend is offline → show connection error
    ───────────────────────────────────────────── */
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault(); // stop page from refreshing

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      // Basic validation before even hitting the API
      if (!username || !password) {
        showAlert('Please enter both username and password.');
        return;
      }

      setLoading(true);
      document.getElementById('alertBox').style.display = 'none';

      /* Retry-aware fetch — Render free tier cold starts take ~30 s */
      async function fetchWithRetry(url, options, retries = 4) {
        for (let attempt = 1; attempt <= retries; attempt++) {
          try {
            const ctrl = new AbortController();
            const tid  = setTimeout(() => ctrl.abort(), 35000); // 35 s per attempt
            const res  = await fetch(url, { ...options, signal: ctrl.signal });
            clearTimeout(tid);
            return res;
          } catch (e) {
            if (attempt === retries) throw e;
            showAlert(`Server starting up… attempt ${attempt}/${retries}. Please wait (~30 s on first load).`, 'info');
            await new Promise(r => setTimeout(r, 10000));
          }
        }
      }

      try {
        const response = await fetchWithRetry(`${API}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (response.ok && data.access_token) {
          localStorage.setItem('token',    data.access_token);
          localStorage.setItem('username', username);
          showAlert('Login successful! Redirecting…', 'success');
          setTimeout(() => window.location.href = 'dashboard.html', 800);
        } else {
          showAlert(data.detail || data.message || data.error || 'Invalid username or password.');
        }

      } catch (err) {
        showAlert('Backend unreachable after 3 attempts. The server is sleeping — wait 30 s and try again.');
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
